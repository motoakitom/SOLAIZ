<!-- 仮のoffline.htmlファイルです。予約フォームの例を含めています。必要に応じて編集・削除してください。 -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オフライン - SOLAIZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+JP:wght@400;700&family=Bebas+Neue&family=Kaisei+HarunoUmi:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-hotel-form.css">
    <!-- flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
      /* 丸いデザイン用カスタム */
      .flatpickr-calendar, .flatpickr-day, .flatpickr-months, .flatpickr-innerContainer, .flatpickr-weekdays {
        border-radius: 1.5em !important;
      }
      .flatpickr-day.selected, .flatpickr-day.today {
        border-radius: 50% !important;
        background: #1e90ff;
        color: #fff;
      }
      .flatpickr-day {
        border-radius: 1em !important;
        transition: background 0.15s, color 0.15s;
      }
      .flatpickr-month {
        border-radius: 1.2em 1.2em 0 0 !important;
      }
      .flatpickr-calendar {
        box-shadow: 0 8px 32px rgba(30,144,255,0.11);
        border: 1.5px solid #b5c8e2;
      }
    </style>
</head>
<body>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#141830; color:#fff;">
    <div class="reserve-form-wrap" style="max-width:400px;margin:60px auto;padding:32px 24px;border-radius:16px;">
        <form>
            <label class="reserve-label" for="checkin">チェックイン</label>
            <input class="reserve-input" type="date" id="checkin" name="checkin"><br><br>
            <label class="reserve-label" for="checkout">チェックアウト</label>
            <input class="reserve-input" type="date" id="checkout" name="checkout"><br><br>
            <label class="reserve-label" for="name">お名前</label>
            <input class="reserve-input" type="text" id="name" name="name"><br><br>
            <button type="submit" style="background:#fff;color:#141830;font-weight:bold;padding:8px 24px;border:none;border-radius:8px;">予約する</button>
        </form>
    </div>
    <p style="text-align:center;margin-top:40px;">オフライン状態です。インターネット接続をご確認ください。</p>
</body>
</html>
