<!-- 仮のoffline.htmlファイルです。予約フォームの例を含めています。必要に応じて編集・削除してください。 -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オフライン - SOLAIZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#141830; color:#fff;">
    <div class="reserve-form-wrap" style="max-width:400px;margin:60px auto;padding:32px 24px;border-radius:16px;">
        <form>
            <label class="reserve-label" for="checkin">チェックイン</label>
            <input class="reserve-input" type="date" id="checkin" name="checkin"><br><br>
            <label class="reserve-label" for="checkout">チェックアウト</label>
            <input class="reserve-input" type="date" id="checkout" name="checkout"><br><br>
            <label class="reserve-label" for="name">お名前</label>
            <input class="reserve-input" type="text" id="name" name="name"><br><br>
            <button type="submit" style="background:#fff;color:#141830;font-weight:bold;padding:8px 24px;border:none;border-radius:8px;">予約する</button>
        </form>
    </div>
    <p style="text-align:center;margin-top:40px;">オフライン状態です。インターネット接続をご確認ください。</p>
</body>
</html>
