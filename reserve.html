<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ご予約入力 | SOLAIZ 石垣</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Noto+Sans+JP:wght@400;700&family=Bebas+Neue&family=Kaisei+HarunoUmi:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style-hotel-form.css">
  <!-- flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    /* 丸いデザイン用カスタム */
    .flatpickr-calendar, .flatpickr-day, .flatpickr-months, .flatpickr-innerContainer, .flatpickr-weekdays {
      border-radius: 1.5em !important;
    }
    .flatpickr-day.selected, .flatpickr-day.today {
      border-radius: 50% !important;
      background: #1e90ff;
      color: #fff;
    }
    .flatpickr-day {
      border-radius: 1em !important;
      transition: background 0.15s, color 0.15s;
    }
    .flatpickr-month {
      border-radius: 1.2em 1.2em 0 0 !important;
    }
    .flatpickr-calendar {
      box-shadow: 0 8px 32px rgba(30,144,255,0.11);
      border: 1.5px solid #b5c8e2;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a href="index.html" class="logo"><img src="images/logo.png" alt="SOLAIZロゴ" class="header-logo-img" style="vertical-align:middle; filter: invert(1) brightness(2);"></a>
      <ul class="nav-links">
        <li><a href="index.html">ホーム</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="facility.html">施設紹介</a></li>
        <li><a href="gallery.html">ギャラリー</a></li>
        <li><a href="staff.html">スタッフ紹介</a></li>
        <li><a href="company.html">会社概要</a></li>
        <li><a href="#access">アクセス</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <div class="reserve-form-wrap" style="max-width:420px;margin:60px auto 0 auto;padding:32px 24px;border-radius:16px;background:#1e90ff;">
      <h2 style="text-align:center;margin-bottom:1.3em;color:#fff;">ご予約入力フォーム</h2>
      <form class="reserve-form" style="display:flex;flex-direction:column;gap:1em;">
        <div style="display:flex;flex-direction:column;">
          <label class="reserve-label" for="checkin">チェックイン日</label>
          <input class="reserve-input" type="date" id="checkin" name="checkin" required>
        </div>
        <div style="display:flex;flex-direction:column;">
          <label class="reserve-label" for="checkout">チェックアウト日</label>
          <input class="reserve-input" type="date" id="checkout" name="checkout" required>
        </div>
        <div style="display:flex;flex-direction:column;">
          <label class="reserve-label" for="name">お名前</label>
          <input class="reserve-input" type="text" id="name" name="name" required>
        </div>
        <div style="display:flex;flex-direction:column;">
          <label class="reserve-label" for="email">メールアドレス</label>
          <input class="reserve-input" type="email" id="email" name="email" required>
        </div>
        <div style="display:flex;flex-direction:column;">
          <label class="reserve-label" for="guests">ご利用人数</label>
          <input class="reserve-input" type="number" id="guests" name="guests" min="1" max="10" required>
        </div>
        <div style="display:flex;flex-direction:column;">
          <label class="reserve-label" for="message">ご要望・ご質問</label>
          <textarea class="reserve-input" id="message" name="message" rows="3"></textarea>
        </div>
        <button type="submit" class="cta-btn sauna-btn" style="margin-top:0.5em;width:100%;">送信</button>
      </form>
    </div>
  </main>
</body>
</html>
